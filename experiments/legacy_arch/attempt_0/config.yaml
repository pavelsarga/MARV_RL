name: ftr_ppo_crossing_ensembled_arch
comment: 'FTR Isaac Sim training with flipper_training-style split encoder (FtrFlipperStyleEncoder:
  CNN 45x21 hmap → 64-D, MLP state → 64-D) instead of FtrCNNFlatEncoder. Reward values
  and policy/GAE/PPO architecture from mixed_training_smoothness.yaml. Training scale
  (num_robots, total_frames, optimizer, scheduler) from ftr_config_A_new.yaml.

  '
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda
training_dtype: ${dtype:float32}
num_robots: 1024
task: Ftr-Crossing-Direct-v0
terrain: cur_mixed
total_frames: ${mul:5242880,12}
time_steps_per_batch: 128
epochs_per_batch: 5
frames_per_sub_batch: 4096
eval_and_save_every: 10
eval_repeats: 2
eval_repeats_after_training: 20
max_grad_norm: 0.697298401413678
clip_grad_norm_p: 2
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.8
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}
step_penalty_scheduler:
  type: linear
  start_factor: 0.5
  end_factor: 1.0
  total_iters: ${intdiv:${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}},1}
action_bonus_coef_scheduler: null
gae_opts:
  gamma: 0.999
  lmbda: 0.95
  average_gae: false
  skip_existing: false
ppo_opts:
  clip_epsilon: 0.2
  entropy_bonus: true
  entropy_coef: 0.02
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: false
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: true
  actor_optimizer_opts:
    lr: 0.0004824297168107223
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.0023065521662259366
    weight_decay: 0.0001
ftr_obs_encoder_opts:
  flipper_style: true
  output_dim: 128
  cnn_output_dim: 64
  state_output_dim: 64
  state_hidden_dim: 64
  state_num_hidden: 2
  state_layernorm: true
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true
extra_env_transforms: []
policy_weights_path: null
vecnorm_weights_path: null
robot_max_linear_velocity: 10.0
robot_max_angular_velocity: 720.0
physx_gpu_heap_capacity: 2147483648
physx_gpu_temp_buffer_capacity: 1073741824
physx_gpu_max_num_partitions: 8
solver_position_iterations: 5
solver_velocity_iterations: 1
max_depenetration_velocity: 0.12354395702544713
sim_dt: 0.005
env_cfg_overrides:
  goal_reached_reward: 14.0
  failed_reward: -14.0
  shaping_coef: 27.279373033235267
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.32698437193572233
  action_bonus_coef: null
  flipper_action_bonus_coef: null
  timeout_penalty: null
  joint_vel_variance_coef: null
  joint_angle_variance_coef: null
  joint_ang_from_flat_coef: null
  flipper_contact_coef: null
  roll_coef: null
  roll_rate_coef: null
  pitch_coef: null
  pitch_rate_coef: null
  clearance_coef: null
  shock_coef: null
  shock_scale: 10
  legacy_joint_vel_variance_coef: 1.2
  legacy_joint_angle_variance_coef: 0.8
  legacy_track_vel_variance_coef: 1.0
  legacy_roll_rate_coef: 0.8
  legacy_pitch_rate_coef: 0.8
  flipper_pos_max_deg: 90.0
  spawn_yaw_range: 0.0
  flipper_material_friction: 3.0
  wheel_material_friction: 6.0
  terrain_static_friction: 0.9
  terrain_dynamic_friction: 0.7
  shock_fail_limit: null
  flipper_style: ${ftr_obs_encoder_opts.flipper_style}
  track_vel_max: 1.0
log_raw_accel: true
log_raw_accel_interval: 50
