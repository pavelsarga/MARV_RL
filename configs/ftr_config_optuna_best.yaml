name: ftr_ppo_crossing_potential
comment: >
  Best Optuna trial (v1 study, trial #100, 41.4% success rate).
  Trained with 128 envs, 5M frames, pre-physics-fix.
  Physics limits updated to post-fix values (max_angular_velocity, etc.).
  Full training: 512 envs, 8× frames.
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda

training_dtype: ${dtype:float32}

# Number of parallel Isaac Sim environments
num_robots: 512

task: Ftr-Crossing-Direct-v0
terrain: cur_mixed

# Training schedule
total_frames: ${mul:5242880,8}
time_steps_per_batch: 128
epochs_per_batch: 2
frames_per_sub_batch: 4096
eval_and_save_every: 5
save_weights_every: 20
eval_repeats_after_training: 20

# Gradient clipping
max_grad_norm: 0.697298401413678
clip_grad_norm_p: 2

# Optimizer
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}

# LR Scheduler
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.243222963382337
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}

# GAE
gae_opts:
  gamma: 0.995
  lmbda: 0.9017438339478305
  average_gae: false
  skip_existing: false

# PPO loss
ppo_opts:
  clip_epsilon: 0.2963991532684525
  entropy_bonus: true
  entropy_coef: 0.03503850005015567
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: true

# Data collector
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM

# Policy network
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: true
  actor_optimizer_opts:
    lr: 9.70253968458502e-05
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.00057939636234175
    weight_decay: 0.0001

# Observation encoder
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 128
  output_dim: 256
  layernorm: true

# VecNorm
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true

# No extra transforms
extra_env_transforms: []

# Weight loading
policy_weights_path: null #/home/sargapav/robot_rodeo_gym_ws/runs/best_so_far/optuna_best_v1/weights/policy_final.pth
vecnorm_weights_path: null #/home/sargapav/robot_rodeo_gym_ws/runs/best_so_far/optuna_best_v1/weights/vecnorm_final.pth

# Physics safety limits
robot_max_linear_velocity: 10.0       # m/s — allows terrain traversal, still catches explosions
robot_max_angular_velocity: 720.0     # deg/s (~12.6 rad/s) — prevents tumbling runaway without fighting solver
physx_gpu_heap_capacity: 2147483648    # 2 GB
physx_gpu_temp_buffer_capacity: 536870912
physx_gpu_max_num_partitions: 8

# Env config overrides — exact Optuna trial #100 reward params
env_cfg_overrides:
  goal_reached_reward: 12.025947844125055
  failed_reward: -4.669740092748014
  shaping_coef: 26.87546785399381
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.20136560257768404
  joint_vel_variance_coef: 2.9015106858027684
  joint_angle_variance_coef: null
  roll_coef: 0.2
  roll_rate_coef: 1.7648582276619234
  pitch_coef: 0.2
  pitch_rate_coef: 1.3195076246495727
  flipper_pos_max_deg: 90.0
