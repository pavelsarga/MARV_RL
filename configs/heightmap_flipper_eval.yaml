name: heightmap_flipper_eval
comment: >
  Deterministic heightmap-based flipper policy baseline.
  Divides the robot-centric heightmap into front/rear quadrants (middle 10% strip
  excluded), drives each flipper proportionally to terrain height in its quadrant.
  No learning required — for evaluation / benchmarking only.

use_wandb: false
use_tensorboard: false
seed: 42
device: cuda

training_dtype: ${dtype:float32}

num_robots: 64

task: Ftr-Crossing-Direct-v0
terrain: cur_uplifts

# Training schedule (unused in eval but required by FtrPPOConfig)
total_frames: 1
time_steps_per_batch: 128
epochs_per_batch: 1
frames_per_sub_batch: 4096
eval_and_save_every: 1
eval_repeats_after_training: 1
eval_repeats: 1

max_grad_norm: 0.5
clip_grad_norm_p: 2

optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}

scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 1.0
  total_iters: 1

gae_opts:
  gamma: 0.999
  lmbda: 0.95
  average_gae: false
  skip_existing: false

ppo_opts:
  clip_epsilon: 0.2
  entropy_bonus: true
  entropy_coef: 0.02
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: true

data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM

# -----------------------------------------------------------------------
# Heightmap flipper policy — no weights needed
# -----------------------------------------------------------------------
policy_config: ${cls:flipper_training.policies.heightmap_flipper_policy.HeightmapFlipperPolicyConfig}
policy_opts:
  linear_speed: 0.4         # forward speed in [-1, 1]; override with --const_linear_vel
  angular_speed: 0.0        # 0 = drive straight
  gain: 2                 # proportional gain: terrain_signal → flipper velocity
  deadzone: 0.025            # minimum |signal| to trigger terrain control; inside deadzone returns to horizontal
  return_gain: 0.6         # P-gain for return-to-zero inside the deadzone (-return_gain * angle / max_angle)
  sync_flippers: false      # true → use front/rear halves instead of quadrants (FL=FR, RL=RR)
  middle_band_frac: 0.1    # fraction of heightmap rows excluded under the robot (~4 rows)

policy_weights_path: ""
vecnorm_weights_path: ""

# Observation encoder opts (required by env adapter even though this policy
# ignores observations; keep consistent with training configs)
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 256
  output_dim: 256
  layernorm: true

vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true

extra_env_transforms: []

# Physics safety limits
robot_max_linear_velocity: 10.0
robot_max_angular_velocity: 720.0
physx_gpu_heap_capacity: 2147483648
physx_gpu_temp_buffer_capacity: 1073741824
physx_gpu_max_num_partitions: 8
solver_position_iterations: 5
solver_velocity_iterations: 1
max_depenetration_velocity: 0.12354395702544713
sim_dt: 0.005

env_cfg_overrides:
  goal_reached_reward: 60
  failed_reward: -15
  shaping_coef: 30
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.08
  action_bonus_coef: 3
  lin_to_flipper_action_ratio: 1
  timeout_penalty: null
  joint_vel_variance_coef: null
  joint_angle_variance_coef: 0.2
  flipper_contact_coef: 0
  roll_coef: 0.3
  roll_rate_coef: 0
  pitch_coef: 0.5
  pitch_rate_coef: 0
  clearance_coef: 0
  shock_coef: 0
  shock_scale: 10
  flipper_pos_max_deg: 75.0
  spawn_yaw_range: 0.0
