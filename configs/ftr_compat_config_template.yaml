name: ftr_compat_ppo_crossing
use_wandb: false
use_tensorboard: false
seed: 42
device: cuda

training_dtype: ${dtype:float32}

# Number of parallel environments.
# FTR typically uses 512 (Isaac Sim); flipper_training works well with 256 on a single GPU.
num_robots: 256

# FTR terrain name → automatically resolved to FtrTerrainPatchGenerator + .map path.
# Supported: cur_mixed, cur_base, cur_stairs_up, cur_stairs_down, cur_steps_up, cur_steps_down, cur_waves.
# Override with an explicit heightmap_gen + heightmap_gen_opts if needed.
terrain: cur_mixed

# ── FTR-only keys (ignored by this script, kept for config parity) ────────────
# These exist in ftr_config_new_v5.yaml and ftr_config_recommended.yaml but are
# specific to Isaac Sim / PhysX and have no effect in flipper_training.
# task: Ftr-Crossing-Direct-v0
# robot_max_linear_velocity: 10.0
# robot_max_angular_velocity: 720.0
# physx_gpu_heap_capacity: 2147483648
# physx_gpu_temp_buffer_capacity: 1073741824
# physx_gpu_max_num_partitions: 8
# solver_position_iterations: 5
# solver_velocity_iterations: 1
# max_depenetration_velocity: 0.12354395702544713
# sim_dt: 0.005
# ─────────────────────────────────────────────────────────────────────────────

# Training schedule
total_frames: ${mul:5242880,8}
time_steps_per_batch: 128
epochs_per_batch: 5
frames_per_sub_batch: 4096
eval_and_save_every: 10
eval_repeats: 4
eval_repeats_after_training: 20

# Max env steps during each evaluation rollout.
max_eval_steps: 1000

# Gradient clipping
max_grad_norm: 0.697298401413678
clip_grad_norm_p: 2

# Optimizer (lr set per param group in policy_opts below)
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}

# LR Scheduler
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.85
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}

# step_penalty scheduler — anneals the per-step penalty over training.
# type: 'linear' or 'exponential'
# null = disabled (step_penalty stays constant).
step_penalty_scheduler:
  type: linear
  start_factor: 0.0
  end_factor: 1.0   # step_penalty ramps from 0 → full value
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}

# action_bonus_coef scheduler — anneals movement bonus coefficient over training.
# null = disabled. Silently skipped if action_bonus_coef is null.
action_bonus_coef_scheduler:
  type: linear
  start_factor: 1.0
  end_factor: 0.8
  total_iters: ${intdiv:${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}},10}

# GAE
gae_opts:
  gamma: 0.9987429401128942
  lmbda: 0.995122967462730965
  average_gae: false
  skip_existing: false

# PPO loss
ppo_opts:
  clip_epsilon: 0.2
  entropy_bonus: true
  entropy_coeff: 0.05
  critic_coeff: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: false

# Data collector
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM

# Policy network
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: true
  actor_optimizer_opts:
    lr: 0.0004824297168107223
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.0023065521662259366
    weight_decay: 0.0001

# Observation encoder — FtrCNNFlatEncoder (CNN for 45×21 heightmap + MLP for state).
# Used by FtrCompatObservation.get_encoder() with state_dim=23 (968-D obs total).
# Identical key name to ftr_config_new_v5.yaml for drop-in compatibility.
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 256
  output_dim: 128
  layernorm: true

# VecNorm
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true

# No extra transforms
extra_env_transforms: []

# Weight loading (optional)
policy_weights_path: null
vecnorm_weights_path: null

# ── flipper_training engine settings ─────────────────────────────────────────
# These have no equivalent in FTR / Isaac Sim configs.

# Terrain grid resolution (metres/cell) and half-extent (metres).
# The physics engine builds a max_coord×max_coord world grid for contact lookups.
grid_res: 0.05
max_coord: 8.0

# Number of physics sub-steps per RL environment step.
# 4 sub-steps × dt=0.007 s → 0.028 s per control step (≈ 36 Hz).
engine_iters_per_env_step: 4

# Low-level physics engine overrides (see PhysicsEngineConfig for all options).
# Uncomment and adjust as needed.
engine_opts: {}
# engine_opts:
#   dt: 0.007          # physics timestep (seconds)
#   damping_alpha: 5.0 # velocity damping

# Contact / friction model overrides (see TerrainConfig).
world_opts: {}
# world_opts:
#   k_stiffness: 30000.0
#   k_friction_lon: 0.8
#   k_friction_lat: 0.5

# Robot model overrides (see RobotModelConfig).
robot_model_opts: {}

# RandomNavigationObjective overrides.
# Defaults: min_dist_to_goal=3.0, max_dist_to_goal=max_coord*1.2, goal_reached_threshold=0.25
objective_opts: {}

# Optional explicit heightmap generator override (instead of auto-resolving from terrain name).
# Example — use FTR terrain at a custom map path:
#   heightmap_gen: ${cls:flipper_training.heightmaps.ftr_terrain.FtrTerrainPatchGenerator}
#   heightmap_gen_opts:
#     map_path: /path/to/ftr_envs/assets/terrain/map/cur_mixed.map
#     z_offset: 0.5
heightmap_gen_opts: {}

# ── Env config overrides — identical to ftr_config_new_v5.yaml ───────────────
# All keys are passed directly to FtrCompatReward.  Set a key to null to disable
# the corresponding reward term.
env_cfg_overrides:
  # ── Terminal rewards ────────────────────────────────────────────────────────
  goal_reached_reward: 120
  failed_reward: -30

  # ── Potential-based shaping ─────────────────────────────────────────────────
  shaping_coef: 40
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.15

  # ── Movement bonus ──────────────────────────────────────────────────────────
  action_bonus_coef: 0.8
  lin_to_flipper_action_ratio: 0.6
  lin_action_ratio: 0.7

  # One-time penalty on episode timeout. null = disabled.
  timeout_penalty: null

  # ── Stability penalties ─────────────────────────────────────────────────────
  # Penalises variance of flipper velocity commands. null = disabled.
  joint_vel_variance_coef: null

  # Penalises asymmetric front/rear flipper positions.
  joint_angle_variance_coef: 0.1

  # Penalises excessive roll (dead-zone 15°).
  roll_coef: 1

  # Penalises roll angular rate. null = disabled.
  roll_rate_coef: null

  # Penalises excessive pitch (dead-zone 7.5°).
  pitch_coef: 1.5

  # Penalises pitch angular rate. null = disabled.
  pitch_rate_coef: null

  # Penalises body dragging close to ground.
  clearance_coef: 0.05

  # Shock penalty (large linear accelerations). null = disabled.
  shock_coef: null
  shock_scale: 10

  # ── FTR-only keys (not used by FtrCompatReward, safely ignored) ─────────────
  # flipper_contact_coef is not implemented in flipper_training (no torque sensor).
  # flipper_contact_coef: null
  # flipper_contact_effort_limit: 1000.0
  # spawn_yaw_range: 0.0     ← set via objective_opts instead

  # ── Flipper range ───────────────────────────────────────────────────────────
  # Used by FtrCompatObservation (normalisation) and FtrCompatReward (action bonus).
  flipper_pos_max_deg: 60.0
