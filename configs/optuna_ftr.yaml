# Optuna hyperparameter search config for FTR-Crossing-Potential-v0
# Used by: optuna_train_ftr.py
# Run via: slurm/optuna_ftr.sbatch  (SLURM array — one trial per job)
#
# Metric: eval/success_rate  (from FtrTorchRLEnv.pop_termination_info(), averaged
#         over eval_repeats_after_training rollouts at the end of each training run)
#
# Search space: 22 parameters
#   Rewards (10): goal/fail bonuses, shaping, step penalty,
#                 joint-velocity/angle variance, roll/pitch rate/angle penalties
#   Architecture (2): actor & value LR (log scale)
#   PPO (4): entropy coefficient (log scale), clip epsilon,
#            GAE gamma (also controls shaping_gamma) and lambda
#   Physics (4): solver iterations, depenetration velocity, sim timestep

study_name: "ftr_optuna_v12"
directions:
  - maximize
metrics_to_optimize:
  - "eval/success_rate"
num_trials: 300           # total trials across all SLURM array tasks
gpu: 0                    # CUDA_VISIBLE_DEVICES inside each process

# -----------------------------------------------------------------------
# Keys use OmegaConf dotlist notation → nested into the training config.
# All three arrays (keys, types, values) MUST be the same length (15).
# -----------------------------------------------------------------------
optuna_keys:
  # ── Reward structure (7) ──────────────────────────────────────────────
  - "env_cfg_overrides.goal_reached_reward"
  - "env_cfg_overrides.failed_reward"
  - "env_cfg_overrides.shaping_coef"
  - "env_cfg_overrides.step_penalty"
  - "env_cfg_overrides.action_bonus_coef"
  # ── Stability penalties (4) ───────────────────────────────────────────
  - "env_cfg_overrides.joint_angle_variance_coef"
  - "env_cfg_overrides.roll_coef"
  - "env_cfg_overrides.pitch_coef"
  - "env_cfg_overrides.clearance_coef"
  # ── PPO / GAE (3) ────────────────────────────────────────────────────
  - "ppo_opts.entropy_coef"
  - "gae_opts.gamma"
  - "gae_opts.lmbda"

optuna_types:
  # Reward structure
  - float       # goal_reached_reward
  - float       # failed_reward
  - float       # shaping_coef
  - float       # step_penalty
  - float       # action_bonus_coef
  # Stability penalties
  - float       # joint_angle_variance_coef
  - float       # roll_coef
  - float       # pitch_coef
  - float       # clearance_coef
  # PPO / GAE
  - log_float   # entropy_coef
  - float       # gae gamma (also controls shaping_gamma via resolver)
  - float       # gae lmbda

optuna_values:
  # Reward structure — ranges from recent training runs
  - [20.0, 300.0]       # goal_reached_reward (v5: 120, recent: 60)
  - [-100.0, -5.0]       # failed_reward (v5: -30, recent: -15 to -20)
  - [10.0, 100.0]        # shaping_coef (v5: 40, recent: 12–30)
  - [-0.5, -0.05]       # step_penalty (v5: -0.15, recent: -0.08)
  - [0.0, 10.0]          # action_bonus_coef (v5: 0.8, recent: 1–3, 0=effectively disabled)
  # Stability penalties — 0 effectively disables each
  - [0.0, 0.5]          # joint_angle_variance_coef (v5: 0.1, recent: 0.1–0.2)
  - [0.0, 2]          # roll_coef (v5: 1.0, recent: 0.3–0.6)
  - [0.0, 3]          # pitch_coef (v5: 1.5, recent: 0.5–1.0)
  - [0.0, 0.2]          # clearance_coef (v5: 0.05, penalises standing on flipper tips)
  # PPO / GAE
  - [0.005, 0.1]        # entropy_coef (current: 0.05)
  - [0.99, 0.9999]      # gae gamma (current: 0.9987, controls horizon + shaping bias)
  - [0.9, 0.999]        # gae lmbda (current: 0.995)

# Applied on top of the base training config before sampling begins.
# Shorter total_frames and fewer envs keep each trial fast enough for grid search.
train_config_overrides:
  use_wandb: true
  use_tensorboard: false
  eval_repeats_after_training: 10      # average over 10 rollouts for stable success-rate signal
  total_frames: ${mul:5242880,1}               # ~10M frames (~1/3 of full training) for fast trials
  num_robots: 1024                 