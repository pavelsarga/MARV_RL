name: ftr_ppo_crossing_potential
comment: 'Best Optuna trial (v1 study, trial #100, 41.4% success rate). Trained with
  128 envs, 5M frames, pre-physics-fix. Physics limits updated to post-fix values
  (max_angular_velocity, etc.). Full training: 512 envs, 8× frames.

  '
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda:0
training_dtype: ${dtype:float32}
num_robots: 128
task: Ftr-Crossing-Direct-v0
terrain: cur_mixed
total_frames: 5242880
time_steps_per_batch: 128
epochs_per_batch: 2
frames_per_sub_batch: 4096
eval_and_save_every: 5
save_weights_every: 20
max_eval_steps: 1000
eval_repeats_after_training: 10
max_grad_norm: 0.697298401413678
clip_grad_norm_p: 2
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.243222963382337
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}
gae_opts:
  gamma: 0.991679281526269
  lmbda: 0.9444592009266283
  average_gae: false
  skip_existing: false
ppo_opts:
  clip_epsilon: 0.24361823616327907
  entropy_bonus: true
  entropy_coef: 0.03503850005015567
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: true
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 3
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 3
    hidden_dim: 256
    layernorm: true
  actor_optimizer_opts:
    lr: 0.00010770730018127067
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.00057939636234175
    weight_decay: 0.0001
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 128
  output_dim: 256
  layernorm: true
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true
extra_env_transforms: []
policy_weights_path: null
vecnorm_weights_path: null
robot_max_linear_velocity: 10.0
robot_max_angular_velocity: 720.0
physx_gpu_heap_capacity: 2147483648
physx_gpu_temp_buffer_capacity: 536870912
physx_gpu_max_num_partitions: 8
env_cfg_overrides:
  goal_reached_reward: 29.15675393513997
  failed_reward: -8.32004190161555
  shaping_coef: 30.435527426675947
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.15690457668805124
  joint_vel_variance_coef: 1.946363906430773
  joint_angle_variance_coef: 0.6401266728414847
  roll_coef: 0.5697887483218249
  roll_rate_coef: 0.10390473281197266
  pitch_coef: 1.9312888305758378
  pitch_rate_coef: 0.34912941092696603
  flipper_pos_max_deg: 90.0
solver_position_iterations: 4
solver_velocity_iterations: 4
max_depenetration_velocity: 0.04130682474146326
sim_dt: 0.005
