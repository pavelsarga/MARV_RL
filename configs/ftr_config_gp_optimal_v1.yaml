# GP-optimal config — study: ftr_optuna_smooth_v2
# Main GP     : 159 trials × 25 params
#   predicted score : 0.4494 ± 0.1016
#   observed best   : 0.4379
# Secondary GP: 27 trials × 2 params (clip_epsilon, max_grad_norm)
#   predicted score : 0.4379 ± 0.0005
name: ftr_ppo_crossing_ground
comment: Fine-tuning from FTR config A with modified reward coefficients and flipper
  limits to encourage more cautious traversal and reduce shock damage.
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda
training_dtype: ${dtype:float32}
num_robots: 1024
task: Ftr-Crossing-Direct-v0
terrain: cur_mixed
total_frames: ${mul:5242880,12}
time_steps_per_batch: 128
epochs_per_batch: 5
frames_per_sub_batch: 4096
eval_and_save_every: 10
eval_repeats: 2
eval_repeats_after_training: 20
max_grad_norm: 0.4359255072363518
clip_grad_norm_p: 2
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.8
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}
step_penalty_scheduler:
  type: linear
  start_factor: 0.5
  end_factor: 1.0
  total_iters: ${intdiv:${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}},1}
action_bonus_coef_scheduler:
  type: linear
  start_factor: 1.0
  end_factor: 1.0
  total_iters: ${intdiv:${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}},1}
gae_opts:
  gamma: 0.9900046734850493
  lmbda: 0.998941593392934
  average_gae: false
  skip_existing: false
ppo_opts:
  clip_epsilon: 0.3343158649944142
  entropy_bonus: true
  entropy_coef: 0.005075232806955579
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: false
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 256
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 128
    layernorm: true
  actor_optimizer_opts:
    lr: 5.1969648526700797e-05
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.00035889298453722625
    weight_decay: 0.0001
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 256
  output_dim: 128
  layernorm: true
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true
extra_env_transforms: []
policy_weights_path: null
vecnorm_weights_path: null
robot_max_linear_velocity: 10.0
robot_max_angular_velocity: 720.0
physx_gpu_heap_capacity: 2147483648
physx_gpu_temp_buffer_capacity: 1073741824
physx_gpu_max_num_partitions: 8
solver_position_iterations: 5
solver_velocity_iterations: 1
max_depenetration_velocity: 0.12354395702544713
sim_dt: 0.005
env_cfg_overrides:
  goal_reached_reward: 215.85444115884619
  failed_reward: -99.21511706437255
  shaping_coef: 84.63123271937621
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.051302038469213995
  action_bonus_coef: 19.84129838011239
  lin_action_ratio: 0.3104698123640504
  flipper_action_bonus_coef: 3.5133211654886045
  timeout_penalty: null
  joint_vel_variance_coef: null
  joint_angle_variance_coef: 0.2657866307089117
  joint_ang_from_flat_coef: 0.9938791389567553
  flipper_contact_coef: null
  roll_coef: 4.3378958829672785
  roll_rate_coef: 4.955604657337866
  pitch_coef: 2.652529656598483
  pitch_rate_coef: 4.451331501945478
  clearance_coef: 0.5718495061637836
  shock_coef: 6.124151126046508
  shock_scale: 10
  flipper_pos_max_deg: 90.0
  spawn_yaw_range: 0.0
  flipper_material_friction: 3.0
  wheel_material_friction: 6.0
  terrain_static_friction: 0.9
  terrain_dynamic_friction: 0.7
  shock_fail_limit: null
log_raw_accel: false
log_raw_accel_interval: 50
