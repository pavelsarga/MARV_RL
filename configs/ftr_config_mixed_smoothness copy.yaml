name: ftr_ppo_crossing_potential
comment: PPO training using FTR-Benchmark Isaac Sim physics (FtrCrossingPotentialEnvCfg)
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda

training_dtype: ${dtype:float32}

# Number of parallel Isaac Sim environments
num_robots: 256

task: Ftr-Crossing-Direct-v0
terrain: cur_mixed

# Training schedule
total_frames: ${mul:5242880,4}
time_steps_per_batch: 128
epochs_per_batch: 2
frames_per_sub_batch: 4096
eval_and_save_every: 10
eval_repeats_after_training: 20

# Gradient clipping
max_grad_norm: 0.5
clip_grad_norm_p: 2

# Optimizer (lr set per param group in policy_opts below)
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}

# LR Scheduler
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.5
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}

# GAE
gae_opts:
  gamma: 0.999
  lmbda: 0.95
  average_gae: false
  skip_existing: false

# PPO loss
ppo_opts:
  clip_epsilon: 0.2
  entropy_bonus: true
  entropy_coef: 0.02
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: true

# Data collector
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM

# Policy network
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: true
  actor_optimizer_opts:
    lr: 0.0003087412258515977
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.00022213390619675794
    weight_decay: 0.0001

# Observation encoder (FtrFlatObservation, 115-D input)
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 256
  output_dim: 256
  layernorm: true

# VecNorm
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true

# No extra transforms
extra_env_transforms: []

# Weight loading (optional)
policy_weights_path: null
vecnorm_weights_path: null

# Physics safety limits (applied to env_cfg before env creation)
robot_max_linear_velocity: 10.0   # m/s — allows terrain traversal, still catches explosions
robot_max_angular_velocity: 720.0 # deg/s (~12.6 rad/s) — prevents tumbling runaway without fighting solver
physx_gpu_heap_capacity: 2147483648    # 2**31 = 2 GB
physx_gpu_temp_buffer_capacity: 536870912  # 2**29 = 516 MB
physx_gpu_max_num_partitions: 8

# Env config overrides — applied via setattr to the env cfg before env creation.
# Supports any direct attribute of MarvCrossingPotentialEnvCfg (or its parents).
env_cfg_overrides:
  # Potential-based reward shaping
  goal_reached_reward: 14
  failed_reward: -14
  shaping_coef: 27.279373033235267
  shaping_gamma: ${gae_opts.gamma}
  step_penalty: -0.32698437193572233
  # Optional penalty coefficients (set to null to disable)
  joint_vel_variance_coef: 0.8
  joint_angle_variance_coef: null
  roll_coef: 0.2
  roll_rate_coef: 0.8
  pitch_coef: 0.2
  pitch_rate_coef: 0.8
  # Flipper max angle 60° for ftr 90° for marv
  flipper_pos_max_deg: 60.0
