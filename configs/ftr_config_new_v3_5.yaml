name: ftr_ppo_crossing_ground
comment: shock, clerance, updated contact and new pitch/roll penalties
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda

training_dtype: ${dtype:float32}

# Number of parallel Isaac Sim environments
num_robots: 512

task: Ftr-Crossing-Direct-v0
terrain: cur_mixed

# Training schedule
total_frames: ${mul:5242880,8}
time_steps_per_batch: 128
epochs_per_batch: 5
frames_per_sub_batch: 4096
eval_and_save_every: 5
eval_repeats_after_training: 20

# Gradient clipping
max_grad_norm: 0.697298401413678
clip_grad_norm_p: 2

# Optimizer (lr set per param group in policy_opts below)
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts: {}

# LR Scheduler
scheduler: ${cls:torch.optim.lr_scheduler.LinearLR}
scheduler_opts:
  start_factor: 1.0
  end_factor: 0.85
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}

# action_bonus_coef scheduler — linear decay (same semantics as LinearLR).
# Decays from action_bonus_coef * start_factor → action_bonus_coef * end_factor over total_iters PPO iterations.
# null = disabled (action_bonus_coef stays constant throughout training).
action_bonus_coef_scheduler:
  start_factor: 1.0
  end_factor: 0.25
  total_iters: ${intdiv:${total_frames},${mul:${time_steps_per_batch},${num_robots}}}

# GAE
gae_opts:
  gamma: 0.9987429401128942
  lmbda: 0.995122967462730965
  average_gae: false
  skip_existing: false

# PPO loss
ppo_opts:
  clip_epsilon: 0.2
  entropy_bonus: true
  entropy_coef: 0.05
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: false

# Data collector
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM

# Policy network
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: true
  actor_optimizer_opts:
    lr: 0.0004824297168107223
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.0023065521662259366
    weight_decay: 0.0001oal_reached_reward
        reward[self._fail_mask] += cfg.fail

# Observation encoder (FtrFlatObservation, 966-D input)
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 256
  output_dim: 128
  layernorm: true

# VecNorm
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true

# No extra transforms
extra_env_transforms: []

# Weight loading (optional)
policy_weights_path: null
vecnorm_weights_path: null

# Physics safety limits (applied to env_cfg before env creation)
robot_max_linear_velocity: 10.0
robot_max_angular_velocity: 720.0
physx_gpu_heap_capacity: 2147483648
physx_gpu_temp_buffer_capacity: 1073741824
physx_gpu_max_num_partitions: 8
# Solver settings, should lower explosions and improve stability at the cost of sim speed
solver_position_iterations: 5
solver_velocity_iterations: 1
max_depenetration_velocity: 0.12354395702544713
sim_dt: 0.005

# Env config overrides — applied via setattr to the env cfg before env creation.
# Supports any direct attribute of MarvCrossingPotentialEnvCfg (or its parents).
env_cfg_overrides:
  # ── Terminal rewards ──────────────────────────────────────────────────────
  # One-time bonus when robot reaches the goal.
  # Range: scalar (positive). Should be >> |step_penalty| * episode_len.
  goal_reached_reward: 60

  # One-time penalty for failure (rollover / out-of-range).
  # Range: scalar (negative).
  failed_reward: -15

  # ── Potential-based shaping ───────────────────────────────────────────────
  # Per-step reward = coef * (prev_dist - gamma * curr_dist).
  # At 0.05 m/step progress with coef=20: ~1.0/step; zero when standing still.
  # Range: roughly [-coef*max_step, +coef*max_step] per step. Typical: 0–1/step.
  shaping_coef: 20

  # Discount factor in the potential — should match gae_opts.gamma so shaping is unbiased.
  shaping_gamma: ${gae_opts.gamma}

  # Constant per-step penalty to encourage fast task completion.
  # Range: fixed scalar each step.
  step_penalty: -0.08

  # ── Movement bonus ────────────────────────────────────────────────────────
  # coef * (v_norm^3 * ratio + flipper_norm^3 * (1-ratio)), where v_norm = v/v_max.
  # Range: [-coef, +coef]. Typical when moving forward at ~0.5 v_max: ~0.1*coef.
  # Encourages movement early in training; can be reduced once shaping takes over.
  action_bonus_coef: 3

  # Blend in action bonus: 1.0 = pure linear-velocity bonus, 0.0 = pure flipper-action bonus.
  # 0.5 = equal weight on forward velocity and flipper articulation.
  lin_to_flipper_action_ratio: 0.5

  # One-time penalty on episode timeout (truncation, not failure). null = disabled.
  # Range: scalar (negative). Typical: -0.5.
  timeout_penalty: null

  # ── Stability penalties ───────────────────────────────────────────────────
  # Penalises variance of flipper velocity commands: coef * var(flipper_cmds).
  # Range: [0, coef * large]. Spikes during rapid flipper changes. null = disabled.
  joint_vel_variance_coef: null

  # Penalises asymmetric flipper angles: coef * mean(|FL-FR| + |RL-RR|) / (2 * limit).
  # Range: [0, coef]. 0 = perfectly symmetric, 1 = max asymmetry. Typical on flat ground: 0–0.1.
  joint_angle_variance_coef: 0.2

  # Flipper-ground contact reward via torque: coef * sqrt(mean * min) of (torque / effort_limit).
  # Geometric mean over 4 flippers — all flippers must be loaded to get full reward.
  # Range: [0, coef]. Idle torque ~50 Nm → ~0.05 normalised; full contact ~650 Nm → ~0.65.
  # Typical when all flippers on ground: ~0.5–0.65 * coef.
  flipper_contact_coef: 0.5

  # Penalises excessive roll: coef * clamp(4*(|roll| - π/6) / π, 0, 1).
  # Dead-zone below 30° (π/6); rises linearly to max at 90° (π/2). Typical on flat terrain: 0.
  roll_coef: 0.3

  # Penalises roll rate: coef * |roll_rate| / π.
  # Range: [0, coef * large]. At 1 rad/s: ~0.32 * coef. Typical traversal: 0.1–0.3 * coef.
  roll_rate_coef: 0.1

  # Same formula as roll_coef but for pitch. On stairs robot pitches 30–40° → ~0–0.3 * coef.
  pitch_coef: 0.2

  # Penalises pitch rate: coef * |pitch_rate| / π.
  # Range: [0, coef * large]. At 1 rad/s: ~0.32 * coef. On stairs: ~0.2–0.5 * coef.
  pitch_rate_coef: 0.1

  # Body clearance reward via sigmoid: coef * sigmoid-like function of (height - terrain_height).
  # Saturates near +coef above ~0.1 m clearance; near 0 when dragging on terrain.
  # Range: [-0.5*coef, +coef]. Typical when properly elevated: ~0.5–0.8 * coef.
  clearance_coef: 0.3

  # Shock penalty: coef * (2 / (1 + exp(-accel / shock_scale)) - 1), applied as penalty.
  # Maps acceleration [0, ∞) → [0, 1). At accel = shock_scale: ~0.46; at 2*shock_scale: ~0.76.
  # Range: [0, coef). Typical light traversal: <0.1 * coef; hard falls: ~0.5–0.8 * coef.
  shock_coef: 0.5

  # Sigmoid inflection point in m/s². Set to expected "moderate shock" acceleration.
  # At shock_scale the penalty is ~0.46 * coef; robot is penalised heavily beyond this.
  # Typical peak accel on hard falls: ~10–15 m/s². Recommended: 7–10.
  shock_scale: 10

  # ── Flipper & spawn settings ──────────────────────────────────────────────
  # null = lock flippers horizontal; 90.0 = full ±90° independent control (MARV), 60° for FTR.
  flipper_pos_max_deg: 90.0

  # ± yaw perturbation at spawn in degrees. 0 = always face the goal.
  spawn_yaw_range: 0.0
