name: ftr_ppo_crossing
comment: PPO training using FTR-Benchmark Isaac Sim physics (CrossingEnv)
use_wandb: true
use_tensorboard: false
seed: 42
device: cuda:0

training_dtype: ${dtype:float32}

# Number of parallel Isaac Sim environments (overridden by --num_envs CLI arg)
num_robots: 256

task: Ftr-Crossing-Direct-v0
terrain: cur_steps_up

# Training schedule
total_frames: ${mul:5242880,6}
time_steps_per_batch: 64        # steps collected per env per PPO iteration
epochs_per_batch: 4
frames_per_sub_batch: 2048
eval_and_save_every: 10
eval_repeats_after_training: 3

# Gradient clipping
max_grad_norm: 0.5
clip_grad_norm_p: 2

# Optimizer
optimizer: ${cls:torch.optim.AdamW}
optimizer_opts:
  lr: 0.0003
  weight_decay: 1.0e-05

# LR Scheduler
scheduler: ${cls:torch.optim.lr_scheduler.ExponentialLR}
scheduler_opts:
  gamma: 0.995

# GAE
gae_opts:
  gamma: 0.999
  lmbda: 0.95
  average_gae: false
  skip_existing: false

# PPO loss
ppo_opts:
  clip_epsilon: 0.2
  entropy_bonus: true
  entropy_coef: 0.02
  critic_coef: 1.0
  loss_critic_type: smooth_l1
  normalize_advantage: true
  separate_losses: false

# Data collector
data_collector_opts:
  split_trajs: false
  compile_policy: false
  exploration_type: RANDOM

# Policy network
policy_config: ${cls:flipper_training.policies.mlp_policy.MLPPolicyConfig}
policy_opts:
  share_encoder: false
  apply_baselines_init: true
  actor_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: false
  value_mlp_opts:
    num_hidden: 2
    hidden_dim: 64
    layernorm: true
  actor_optimizer_opts:
    lr: 0.0004824297168107223
    weight_decay: 0.0001
  value_optimizer_opts:
    lr: 0.0023065521662259366
    weight_decay: 0.0001

# Observation encoder (FtrFlatObservation, 115-D input)
ftr_obs_encoder_opts:
  num_hidden: 2
  hidden_dim: 256
  output_dim: 256
  layernorm: true

# VecNorm
vecnorm_opts:
  decay: 0.99
  eps: 0.0001
vecnorm_on_reward: true

# No extra transforms
extra_env_transforms: []

# Weight loading (optional)
policy_weights_path: null
vecnorm_weights_path: null
